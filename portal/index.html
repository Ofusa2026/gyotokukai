<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>特行会 会員ポータル</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ai:#1E3B6E; --kachi:#0B1220; --asagi:#2E8F91; --shu:#B93227;
  --shiro:#F3F4F2; --nezumi:#6E7681; --line:rgba(11,18,32,.14);
  --mincho:"Shippori Mincho B1",serif; --gothic:"Zen Kaku Gothic New",sans-serif; --mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--shiro);color:var(--kachi);font-family:var(--gothic);line-height:1.85;font-feature-settings:"palt" 1;-webkit-font-smoothing:antialiased}
a{color:var(--ai)}
button{font-family:var(--gothic)}
.wrap{width:min(920px,94vw);margin-inline:auto}

/* ヘッダー */
header{position:sticky;top:0;z-index:50;background:rgba(243,244,242,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:12px;height:60px}
.bar svg{width:30px;height:30px;flex:none}
.bar b{font-family:var(--mincho);font-weight:800;letter-spacing:.1em;font-size:1rem}
.bar .sub{font-family:var(--mono);font-size:.62rem;color:var(--nezumi);letter-spacing:.2em;margin-top:2px}
.bar .sp{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn-ask{background:var(--shu);color:#fff;text-decoration:none;padding:8px 14px;border-radius:2px;font-size:.8rem;font-weight:700}
.btn-out{background:none;border:1px solid var(--line);color:var(--nezumi);padding:8px 12px;border-radius:2px;font-size:.76rem;cursor:pointer}
.btn-out:hover{border-color:var(--nezumi)}

/* ログイン */
#login{min-height:calc(100vh - 60px);display:grid;place-items:center;padding:40px 0}
.card{width:min(420px,92vw);background:#fff;border:1px solid var(--line);border-radius:2px;padding:36px 32px;text-align:center}
.card .crest{width:74px;margin:0 auto 18px}
.card h1{font-family:var(--mincho);font-weight:800;font-size:1.3rem;letter-spacing:.06em}
.card p.d{font-size:.84rem;color:var(--nezumi);margin:12px 0 24px}
.card input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:2px;font-size:1rem;background:#F7F8F7;text-align:center;font-family:var(--gothic)}
.card input:focus{outline:none;border-color:var(--ai);background:#fff}
.card input.code{font-family:var(--mono);font-size:1.5rem;letter-spacing:.4em}
.card button.go{width:100%;margin-top:14px;border:0;cursor:pointer;background:var(--shu);color:#fff;padding:14px;border-radius:2px;font-weight:700;font-size:.94rem;letter-spacing:.05em}
.card button.go:disabled{opacity:.5;cursor:default}
.card .msg{font-size:.8rem;margin-top:14px;display:none}
.card .msg.show{display:block}
.card .msg.ng{color:var(--shu)}
.card .msg.ok{color:var(--asagi)}
.card .back{margin-top:16px;font-size:.78rem;color:var(--nezumi);background:none;border:none;cursor:pointer;text-decoration:underline}
.card .lp{margin-top:22px;font-size:.74rem;color:var(--nezumi)}

/* アプリ */
#app{display:none}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:16px 0 0;-webkit-overflow-scrolling:touch}
.tab{flex:none;border:1px solid var(--line);background:#fff;color:var(--nezumi);padding:8px 16px;border-radius:2px;font-size:.82rem;font-weight:500;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--ai);border-color:var(--ai);color:#fff}
.filters{display:flex;gap:8px;align-items:center;margin:14px 0 4px;flex-wrap:wrap}
.filters input{flex:1;min-width:180px;padding:10px 12px;border:1px solid var(--line);border-radius:2px;font-size:.88rem;background:#fff}
.filters input:focus{outline:none;border-color:var(--ai)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:#fff;color:var(--nezumi);padding:5px 12px;border-radius:20px;font-size:.74rem;cursor:pointer}
.chip.on{background:var(--asagi);border-color:var(--asagi);color:#fff}

/* 記事一覧 */
#list{padding:14px 0 60px}
.post{background:#fff;border:1px solid var(--line);border-radius:2px;padding:20px 22px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.post:hover{border-color:var(--ai)}
.post .meta{display:flex;gap:10px;align-items:center;font-family:var(--mono);font-size:.66rem;color:var(--nezumi);letter-spacing:.08em}
.post .meta .cat{color:var(--asagi)}
.post .meta .pin{color:var(--shu)}
.post h3{font-family:var(--mincho);font-weight:600;font-size:1.06rem;margin-top:6px;line-height:1.6}
.post .prev{font-size:.82rem;color:var(--nezumi);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;color:var(--nezumi);font-size:.88rem;padding:60px 0}

/* 記事詳細 */
#detail{display:none;padding:20px 0 80px}
#detail .backbar{margin-bottom:18px}
#detail .backbar button{background:none;border:1px solid var(--line);padding:8px 16px;border-radius:2px;font-size:.8rem;color:var(--nezumi);cursor:pointer}
.article{background:#fff;border:1px solid var(--line);border-radius:2px;padding:clamp(24px,5vw,44px)}
.article .meta{font-family:var(--mono);font-size:.68rem;color:var(--nezumi);letter-spacing:.08em;display:flex;gap:12px}
.article .meta .cat{color:var(--asagi)}
.article h1{font-family:var(--mincho);font-weight:800;font-size:clamp(1.3rem,3vw,1.7rem);line-height:1.6;margin:10px 0 24px;padding-bottom:20px;border-bottom:1px solid var(--line)}
.body{font-size:.95rem}
.body h2{font-family:var(--mincho);font-size:1.15rem;font-weight:600;margin:28px 0 10px}
.body h3{font-family:var(--mincho);font-size:1.02rem;font-weight:600;margin:22px 0 8px}
.body p{margin:12px 0}
.body ul{margin:12px 0 12px 22px}
.body li{margin:4px 0}
.body strong{font-weight:700}
.body a{word-break:break-all}
.loading{text-align:center;padding:80px 0;color:var(--nezumi);font-size:.86rem}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--asagi);outline-offset:2px}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<g id="p8"><path id="pe" d="M0,-49 C13,-42 17,-24 9,-9 L0,-4 L-9,-9 C-17,-24 -13,-42 0,-49 Z"/><use href="#pe" transform="rotate(45)"/><use href="#pe" transform="rotate(90)"/><use href="#pe" transform="rotate(135)"/><use href="#pe" transform="rotate(180)"/><use href="#pe" transform="rotate(225)"/><use href="#pe" transform="rotate(270)"/><use href="#pe" transform="rotate(315)"/></g>
</defs></svg>

<header>
  <div class="wrap bar">
    <svg viewBox="-80 -80 160 160" aria-hidden="true"><circle r="72" fill="none" stroke="#1E3B6E" stroke-width="7"/><g fill="#1E3B6E"><use href="#p8"/></g><circle r="15" fill="#1E3B6E"/></svg>
    <div><b>特行会</b><div class="sub">MEMBER PORTAL ver.20260717.01</div></div>
    <div class="sp" id="hdrTools" style="display:none">
      <a class="btn-ask" id="askBtn" href="#">質問する</a>
      <button class="btn-out" id="logoutBtn">ログアウト</button>
    </div>
  </div>
</header>

<!-- ログイン -->
<div id="login">
  <div class="card">
    <svg class="crest" viewBox="-80 -80 160 160" aria-hidden="true"><circle r="72" fill="none" stroke="#1E3B6E" stroke-width="7"/><circle r="61" fill="none" stroke="#1E3B6E" stroke-width="3"/><g fill="#1E3B6E"><use href="#p8"/></g><circle r="17" fill="#1E3B6E"/><text x="0" y="6.5" text-anchor="middle" fill="#F3F4F2" font-family="Shippori Mincho B1,serif" font-weight="800" font-size="19">特</text></svg>
    <h1>会員ポータル</h1>

    <div id="stepEmail">
      <p class="d">登録済みのメールアドレスを入力してください。ログイン用の6桁コードをお送りします。</p>
      <input type="email" id="inEmail" placeholder="you@example.com" autocomplete="email">
      <button class="go" id="btnSend">ログインコードを送る</button>
    </div>

    <div id="stepCode" style="display:none">
      <p class="d">メールに届いた6桁のコードを入力してください（有効期限10分）。</p>
      <input type="text" id="inCode" class="code" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
      <button class="go" id="btnVerify">ログイン</button>
      <button class="back" id="btnBack">メールアドレスを入れ直す</button>
    </div>

    <p class="msg" id="loginMsg"></p>
    <p class="lp">未登録の方は <a href="../">特行会の登録ページ</a> からご登録ください。</p>
  </div>
</div>

<!-- 本体 -->
<div id="app">
  <div class="wrap">
    <div class="tabs" id="tabs"></div>
    <div class="filters">
      <input type="search" id="q" placeholder="キーワードで検索">
      <div class="chips" id="regions" style="display:none"></div>
    </div>
    <div id="list"></div>
    <div id="detail">
      <div class="backbar"><button id="backList">← 一覧へ戻る</button></div>
      <div class="article">
        <div class="meta"><span class="cat" id="dCat"></span><span id="dDate"></span></div>
        <h1 id="dTitle"></h1>
        <div class="body" id="dBody"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://vzpahholgvkvwtwooejf.supabase.co/functions/v1/portal';
const ASK_TO = 'mail@gyosei-cambo.com';
const CATS = [
  ['all','すべて'],['news','お知らせ'],['shinsa','審査情報'],['qa','Q&A'],
  ['case','ケーススタディ'],['tool','資料・ツール'],['seminar','セミナー']
];
const CATNAME = Object.fromEntries(CATS);
let TOKEN = localStorage.getItem('tgk_token') || '';
let POSTS = [], cat = 'all', region = '', query = '';

const $ = id => document.getElementById(id);
async function api(payload){
  const r = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const d = await r.json().catch(()=>({}));
  return {status:r.status, ...d};
}
function lmsg(t, ok){ const m=$('loginMsg'); m.textContent=t; m.className='msg show '+(ok?'ok':'ng'); }

/* ---- ログイン ---- */
$('btnSend').addEventListener('click', async ()=>{
  const email = $('inEmail').value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ lmsg('メールアドレスの形式をご確認ください。'); return; }
  const b=$('btnSend'); b.disabled=true; b.textContent='送信中…';
  await api({action:'request_otp', email});
  b.disabled=false; b.textContent='ログインコードを送る';
  sessionStorage.setItem('tgk_email', email);
  $('stepEmail').style.display='none'; $('stepCode').style.display='block';
  lmsg('登録済みのアドレスであれば、コードをお送りしました。届かない場合は迷惑メールもご確認ください。', true);
  $('inCode').focus();
});
$('btnBack').addEventListener('click', ()=>{
  $('stepCode').style.display='none'; $('stepEmail').style.display='block';
  $('loginMsg').className='msg';
});
$('btnVerify').addEventListener('click', async ()=>{
  const email = sessionStorage.getItem('tgk_email')||'';
  const code = $('inCode').value.trim();
  if(code.length!==6){ lmsg('6桁のコードを入力してください。'); return; }
  const b=$('btnVerify'); b.disabled=true; b.textContent='確認中…';
  const r = await api({action:'verify_otp', email, code});
  b.disabled=false; b.textContent='ログイン';
  if(r.ok && r.token){
    TOKEN = r.token; localStorage.setItem('tgk_token', TOKEN);
    enter();
  }else if(r.error==='locked'){ lmsg('試行回数の上限に達しました。コードを再送してください。'); }
  else if(r.error==='expired'){ lmsg('コードの有効期限が切れています。再送してください。'); }
  else{ lmsg('コードが一致しません。'); }
});
$('inCode').addEventListener('keydown', e=>{ if(e.key==='Enter') $('btnVerify').click(); });
$('inEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') $('btnSend').click(); });

/* ---- 本体 ---- */
async function enter(){
  $('list').innerHTML = '<div class="loading">読み込み中…</div>';
  $('login').style.display='none'; $('app').style.display='block'; $('hdrTools').style.display='flex';
  const r = await api({action:'get_posts', token:TOKEN});
  if(r.error==='auth'){ localStorage.removeItem('tgk_token'); TOKEN=''; location.reload(); return; }
  POSTS = r.posts||[];
  $('askBtn').href = 'mailto:'+ASK_TO+'?subject='+encodeURIComponent('【特行会】質問：')+'&body='+encodeURIComponent('お名前：\n事務所名：\n質問内容：\n');
  renderTabs(); renderRegions(); renderList();
}
function renderTabs(){
  $('tabs').innerHTML = CATS.map(([k,l])=>`<button class="tab${k===cat?' on':''}" data-k="${k}">${l}</button>`).join('');
  $('tabs').querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
    cat=b.dataset.k; region=''; renderTabs(); renderRegions(); renderList(); showList();
  }));
}
function renderRegions(){
  const box=$('regions');
  if(cat!=='shinsa'){ box.style.display='none'; return; }
  const rs=[...new Set(POSTS.filter(p=>p.category==='shinsa'&&p.region).map(p=>p.region))];
  if(!rs.length){ box.style.display='none'; return; }
  box.style.display='flex';
  box.innerHTML = ['<button class="chip'+(region===''?' on':'')+'" data-r="">全地域</button>']
    .concat(rs.map(r=>`<button class="chip${r===region?' on':''}" data-r="${esc(r)}">${esc(r)}</button>`)).join('');
  box.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{ region=c.dataset.r; renderRegions(); renderList(); }));
}
$('q').addEventListener('input', e=>{ query=e.target.value.trim().toLowerCase(); renderList(); });

function filtered(){
  return POSTS.filter(p=>
    (cat==='all'||p.category===cat) &&
    (!region||p.region===region) &&
    (!query||(p.title+p.body+(p.region||'')).toLowerCase().includes(query))
  );
}
function renderList(){
  const rows = filtered();
  $('list').innerHTML = rows.length ? rows.map(p=>`
    <div class="post" data-id="${p.id}">
      <div class="meta">
        ${p.pinned?'<span class="pin">固定</span>':''}
        <span class="cat">${CATNAME[p.category]||p.category}${p.region?'・'+esc(p.region):''}</span>
        <span>${fdate(p.created_at)}</span>
      </div>
      <h3>${esc(p.title)}</h3>
      <div class="prev">${esc(p.body.replace(/[#*\-]/g,' ').slice(0,120))}</div>
    </div>`).join('')
    : '<div class="empty">該当する記事がありません。</div>';
  $('list').querySelectorAll('.post').forEach(el=>el.addEventListener('click',()=>openPost(el.dataset.id)));
}
function openPost(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  $('dCat').textContent = (CATNAME[p.category]||p.category)+(p.region?'・'+p.region:'');
  $('dDate').textContent = fdate(p.created_at);
  $('dTitle').textContent = p.title;
  $('dBody').innerHTML = md(p.body);
  $('list').style.display='none'; document.querySelector('.filters').style.display='none';
  $('detail').style.display='block'; window.scrollTo({top:0});
}
function showList(){
  $('detail').style.display='none';
  $('list').style.display='block'; document.querySelector('.filters').style.display='flex';
}
$('backList').addEventListener('click', showList);
$('logoutBtn').addEventListener('click', async ()=>{
  await api({action:'logout', token:TOKEN});
  localStorage.removeItem('tgk_token'); location.reload();
});

/* ---- 簡易マークダウン（エスケープ→整形） ---- */
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function md(src){
  const lines = esc(src).split(/\r?\n/);
  let out='', inUl=false;
  const inline = t => t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  for(const ln of lines){
    if(/^\s*[-・]\s+/.test(ln)){ if(!inUl){out+='<ul>';inUl=true;} out+='<li>'+inline(ln.replace(/^\s*[-・]\s+/,''))+'</li>'; continue; }
    if(inUl){ out+='</ul>'; inUl=false; }
    if(/^###\s+/.test(ln)) out+='<h3>'+inline(ln.replace(/^###\s+/,''))+'</h3>';
    else if(/^##\s+/.test(ln)) out+='<h2>'+inline(ln.replace(/^##\s+/,''))+'</h2>';
    else if(ln.trim()==='') out+='';
    else out+='<p>'+inline(ln)+'</p>';
  }
  if(inUl) out+='</ul>';
  return out;
}
function fdate(s){ const d=new Date(s); return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0'); }

/* ---- 起動 ---- */
if(TOKEN) enter();
</script>
</body>
</html>
