<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>特行会 会員ポータル</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ai:#1E3B6E; --ai2:#16305C; --kachi:#0B1220; --asagi:#2E8F91; --shu:#B93227;
  --shiro:#F3F4F2; --nezumi:#6E7681; --line:rgba(11,18,32,.14);
  --mincho:"Shippori Mincho B1",serif; --gothic:"Zen Kaku Gothic New",sans-serif; --mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--shiro);color:var(--kachi);font-family:var(--gothic);line-height:1.85;font-feature-settings:"palt" 1;-webkit-font-smoothing:antialiased}
a{color:var(--ai)}
button{font-family:var(--gothic);cursor:pointer}
::selection{background:var(--ai);color:#fff}
:focus-visible{outline:2px solid var(--asagi);outline-offset:2px}

/* ============ ログイン ============ */
#login{min-height:100vh;display:grid;place-items:center;padding:40px 16px;
  background-color:var(--ai);
  background-image:linear-gradient(rgba(11,18,32,.55),rgba(11,18,32,.55)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 3px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0 1px,transparent 1px 3px);
}
.card{width:min(420px,94vw);background:var(--shiro);border-radius:2px;padding:38px 32px;text-align:center;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
.card .crest{width:74px;margin:0 auto 18px}
.card h1{font-family:var(--mincho);font-weight:800;font-size:1.3rem;letter-spacing:.06em}
.card p.d{font-size:.84rem;color:var(--nezumi);margin:12px 0 24px}
.card input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:2px;font-size:1rem;background:#fff;text-align:center;font-family:var(--gothic)}
.card input:focus{outline:none;border-color:var(--ai)}
.card input.code{font-family:var(--mono);font-size:1.5rem;letter-spacing:.4em}
.card button.go{width:100%;margin-top:14px;border:0;background:var(--shu);color:#fff;padding:14px;border-radius:2px;font-weight:700;font-size:.94rem;letter-spacing:.05em}
.card button.go:disabled{opacity:.5;cursor:default}
.card .msg{font-size:.8rem;margin-top:14px;display:none}
.card .msg.show{display:block}
.card .msg.ng{color:var(--shu)}
.card .msg.ok{color:var(--asagi)}
.card .back{margin-top:16px;font-size:.78rem;color:var(--nezumi);background:none;border:none;text-decoration:underline}
.card .lp{margin-top:22px;font-size:.74rem;color:var(--nezumi)}

/* ============ アプリ骨格 ============ */
#app{display:none;min-height:100vh}
.frame{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

/* サイドバー（藍） */
aside{
  background-color:var(--ai);
  background-image:linear-gradient(rgba(11,18,32,.45),rgba(11,18,32,.45)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.045) 0 1px,transparent 1px 3px);
  color:var(--shiro);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:26px 0 20px;
}
.brand{display:flex;align-items:center;gap:11px;padding:0 22px 22px;border-bottom:1px solid rgba(243,244,242,.14)}
.brand svg{width:34px;height:34px;flex:none}
.brand b{font-family:var(--mincho);font-weight:800;font-size:1.05rem;letter-spacing:.12em;display:block;line-height:1.3}
.brand i{font-family:var(--mono);font-style:normal;font-size:.56rem;letter-spacing:.26em;opacity:.5}
nav{flex:1;padding:14px 12px;overflow-y:auto}
.nv{
  display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;margin:2px 0;
  background:none;border:none;border-left:2px solid transparent;color:rgba(243,244,242,.66);
  font-size:.86rem;font-weight:500;text-align:left;border-radius:0 2px 2px 0;
}
.nv .no{font-family:var(--mono);font-size:.62rem;opacity:.45;width:18px}
.nv .ct{margin-left:auto;font-family:var(--mono);font-size:.64rem;opacity:.45}
.nv:hover{color:var(--shiro);background:rgba(243,244,242,.05)}
.nv.on{color:var(--shiro);border-left-color:var(--shu);background:rgba(243,244,242,.07)}
.nv.on .no{opacity:.9;color:#D98880}
.side-foot{padding:14px 22px 0;border-top:1px solid rgba(243,244,242,.14)}
.side-foot .ask{display:block;text-align:center;background:var(--shu);color:#fff;text-decoration:none;padding:11px;border-radius:2px;font-size:.84rem;font-weight:700;letter-spacing:.04em}
.side-foot .who{font-family:var(--mono);font-size:.6rem;opacity:.45;margin-top:12px;word-break:break-all;line-height:1.5}
.side-foot .out{background:none;border:none;color:rgba(243,244,242,.5);font-size:.72rem;text-decoration:underline;margin-top:6px;padding:0}

/* メイン */
main{min-width:0}
.mainhead{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  background:rgba(243,244,242,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);padding:14px clamp(18px,4vw,44px);
}
.mainhead h2{font-family:var(--mincho);font-weight:800;font-size:1.06rem;letter-spacing:.06em;white-space:nowrap}
.mainhead .q{margin-left:auto;position:relative;width:min(300px,44vw)}
.mainhead .q input{width:100%;padding:9px 13px 9px 34px;border:1px solid var(--line);border-radius:20px;font-size:.84rem;background:#fff}
.mainhead .q input:focus{outline:none;border-color:var(--ai)}
.mainhead .q svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--nezumi)}
.content{padding:clamp(20px,4vw,40px) clamp(18px,4vw,44px) 90px;max-width:1060px}

/* ============ ホーム ============ */
.hero-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.hcard{
  position:relative;overflow:hidden;cursor:pointer;border-radius:2px;color:var(--shiro);
  padding:26px 24px 22px;min-height:168px;display:flex;flex-direction:column;justify-content:flex-end;
  background-color:var(--ai);
  background-image:linear-gradient(rgba(11,18,32,.5),rgba(11,18,32,.5)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 3px);
  transition:transform .18s ease,box-shadow .18s ease;
}
.hcard:hover{transform:translateY(-3px);box-shadow:0 16px 40px -14px rgba(30,59,110,.55)}
.hcard .wm{position:absolute;right:-26px;top:-26px;width:130px;height:130px;opacity:.1}
.hcard .k{font-family:var(--mono);font-size:.62rem;letter-spacing:.22em;color:#7FB6B8}
.hcard h3{font-family:var(--mincho);font-weight:800;font-size:1.14rem;line-height:1.55;margin-top:8px}
.hcard .dt{font-family:var(--mono);font-size:.64rem;opacity:.5;margin-top:10px}

.sect{margin-top:44px}
.sect-h{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sect-h h3{font-family:var(--mincho);font-weight:800;font-size:1.02rem;letter-spacing:.08em}
.sect-h::after{content:"";flex:1;height:1px;background:var(--line)}
.sect-h .more{background:none;border:none;font-size:.76rem;color:var(--nezumi);text-decoration:underline;white-space:nowrap}

/* 新着タイムライン */
.tl{position:relative;padding-left:22px}
.tl::before{content:"";position:absolute;left:5px;top:8px;bottom:8px;width:1px;background:var(--line)}
.tl-item{position:relative;padding:9px 0 9px 8px;cursor:pointer}
.tl-item::before{content:"";position:absolute;left:-21px;top:19px;width:9px;height:9px;border-radius:50%;background:var(--shiro);border:2px solid var(--asagi)}
.tl-item:hover .tl-t{color:var(--ai);text-decoration:underline}
.tl-meta{font-family:var(--mono);font-size:.64rem;color:var(--nezumi);letter-spacing:.08em;display:flex;gap:10px}
.tl-meta .c{color:var(--asagi)}
.tl-t{font-size:.94rem;font-weight:500;line-height:1.6}

/* カテゴリタイル */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
.tile{
  background:#fff;border:1px solid var(--line);border-radius:2px;padding:18px 16px 14px;text-align:left;
  transition:border-color .15s,transform .15s;
}
.tile:hover{border-color:var(--ai);transform:translateY(-2px)}
.tile .no{font-family:var(--mono);font-size:.62rem;color:var(--asagi);letter-spacing:.14em}
.tile h4{font-family:var(--mincho);font-weight:600;font-size:.98rem;margin-top:6px}
.tile .n{font-family:var(--mono);font-size:.68rem;color:var(--nezumi);margin-top:8px}

/* ============ 一覧 ============ */
.regions{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:26px}
.rg{background:#fff;border:1px solid var(--line);border-radius:2px;padding:16px;text-align:left;transition:border-color .15s}
.rg:hover,.rg.on{border-color:var(--asagi)}
.rg.on{background:var(--asagi);color:#fff}
.rg h4{font-family:var(--mincho);font-weight:600;font-size:1rem}
.rg .n{font-family:var(--mono);font-size:.66rem;opacity:.6;margin-top:4px;display:block}
.list .post{background:#fff;border:1px solid var(--line);border-left:3px solid var(--ai);border-radius:2px;padding:18px 22px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.list .post:hover{border-color:var(--ai)}
.post .meta{display:flex;gap:10px;align-items:center;font-family:var(--mono);font-size:.64rem;color:var(--nezumi);letter-spacing:.08em}
.post .meta .cat{color:var(--asagi)}
.post .meta .pin{color:var(--shu)}
.post h3{font-family:var(--mincho);font-weight:600;font-size:1.05rem;margin-top:5px;line-height:1.6}
.post .prev{font-size:.8rem;color:var(--nezumi);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;color:var(--nezumi);font-size:.88rem;padding:70px 0}
.loading{text-align:center;padding:90px 0;color:var(--nezumi);font-size:.86rem}

/* ============ 記事 ============ */
.backbar{margin-bottom:16px}
.backbar button{background:none;border:1px solid var(--line);padding:8px 16px;border-radius:2px;font-size:.8rem;color:var(--nezumi)}
.article{background:#fff;border:1px solid var(--line);border-top:3px solid var(--ai);border-radius:2px;padding:clamp(26px,5vw,48px)}
.article .meta{font-family:var(--mono);font-size:.66rem;color:var(--nezumi);letter-spacing:.08em;display:flex;gap:12px}
.article .meta .cat{color:var(--asagi)}
.article h1{font-family:var(--mincho);font-weight:800;font-size:clamp(1.3rem,3vw,1.7rem);line-height:1.6;margin:10px 0 24px;padding-bottom:20px;border-bottom:1px solid var(--line)}
.abody{font-size:.95rem;max-width:42em}
.abody h2{font-family:var(--mincho);font-size:1.15rem;font-weight:600;margin:30px 0 10px;padding-left:12px;border-left:3px solid var(--asagi)}
.abody h3{font-family:var(--mincho);font-size:1.02rem;font-weight:600;margin:22px 0 8px}
.abody p{margin:12px 0}
.abody ul{margin:12px 0 12px 22px}
.abody li{margin:4px 0}
.abody strong{font-weight:700}
.abody a{word-break:break-all}
.rel{margin-top:34px;padding-top:22px;border-top:1px solid var(--line)}
.rel h4{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;color:var(--nezumi);margin-bottom:12px}
.rel .r{display:block;width:100%;text-align:left;background:none;border:none;padding:7px 0;font-size:.88rem;color:var(--ai);text-decoration:underline}


/* ============ 連携マップ ============ */
.map-head{display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;margin-bottom:8px}
.map-count{font-family:var(--mincho);font-weight:800;font-size:clamp(2.6rem,7vw,4rem);color:var(--ai);line-height:1}
.map-count small{font-size:.45em;color:var(--nezumi);font-weight:600}
.map-sub{font-size:.86rem;color:var(--nezumi)}
.legend{display:flex;gap:18px;margin:14px 0 6px;font-size:.76rem;color:var(--nezumi);flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:7px}
.legend i{width:13px;height:13px;border-radius:2px;display:inline-block}
.jmap{width:100%;max-width:1100px;height:auto;display:block;margin:8px auto 0}
.jmap .pf{cursor:pointer}
.jmap .pf rect{fill:#E4E6E3;stroke:var(--shiro);stroke-width:1.5;transition:fill .5s ease}
.jmap .pf text{font-family:var(--gothic);font-size:6.4px;fill:var(--nezumi);text-anchor:middle;pointer-events:none}
.jmap .pf.talking rect{fill:#9CCFCF}
.jmap .pf.partnered rect{fill:var(--ai)}
.jmap .pf.partnered text{fill:#F3F4F2;font-weight:700}
.jmap .pf:hover rect{fill:var(--asagi)}
.jmap .pf.pop rect{animation:paint .6s ease both}
@keyframes paint{0%{transform:scale(.6);opacity:.2}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.jmap .pf rect{transform-box:fill-box;transform-origin:center}
.map-note{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:2px;padding:16px 20px;font-size:.84rem;display:none}
.map-note b{font-family:var(--mincho)}
.map-note .st{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;margin-left:10px}
.map-note .st.partnered{color:var(--ai)}
.map-note .st.talking{color:var(--asagi)}
.map-note .st.none{color:var(--nezumi)}
.map-list{margin-top:22px}
.map-list h4{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;color:var(--nezumi);margin-bottom:10px}
.map-list .row{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line);font-size:.88rem}
.map-list .row .nm{font-family:var(--mincho);font-weight:600;min-width:5em}
.map-list .row .dt{font-family:var(--mono);font-size:.66rem;color:var(--nezumi);margin-left:auto}


/* ============ 質問箱・マイページ ============ */
.pbtn{border:0;background:var(--shu);color:#fff;padding:12px 22px;border-radius:2px;font-weight:700;font-size:.88rem;letter-spacing:.04em}
.pbtn.sec{background:#fff;color:var(--ai);border:1px solid var(--ai)}
.pbtn:disabled{opacity:.5;cursor:default}
.formbox{background:#fff;border:1px solid var(--line);border-radius:2px;padding:clamp(22px,4vw,32px);max-width:560px}
.formbox .fl{display:block;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;color:var(--nezumi);margin:18px 0 8px}
.formbox .fl:first-child{margin-top:0}
.formbox input[type=text],.formbox select,.formbox textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:2px;font-size:.94rem;background:#F7F8F7;font-family:var(--gothic)}
.formbox textarea{min-height:130px;resize:vertical;line-height:1.8}
.formbox input:focus,.formbox select:focus,.formbox textarea:focus{outline:none;border-color:var(--ai);background:#fff}
.formbox .fmsg{font-size:.8rem;margin-top:12px;display:none}
.formbox .fmsg.show{display:block}
.formbox .fmsg.ng{color:var(--shu)}
.formbox .fmsg.ok{color:var(--asagi)}
.avatar-row{display:flex;align-items:center;gap:16px}
.avatar{width:72px;height:72px;border-radius:50%;background:var(--ai);color:#fff;display:grid;place-items:center;font-family:var(--mincho);font-weight:800;font-size:1.5rem;overflow:hidden;flex:none}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.sm{width:34px;height:34px;font-size:.9rem}
.guideline{background:#fff;border-left:3px solid var(--asagi);border-radius:2px;padding:12px 16px;font-size:.78rem;color:var(--nezumi);margin:18px 0}
.qitem{background:#fff;border:1px solid var(--line);border-left:3px solid var(--asagi);border-radius:2px;padding:18px 22px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.qitem:hover{border-color:var(--asagi)}
.qitem .qm{display:flex;gap:10px;align-items:center;font-size:.76rem;color:var(--nezumi)}
.qitem .qm .cc{margin-left:auto;font-family:var(--mono);font-size:.68rem}
.qitem h3{font-family:var(--mincho);font-weight:600;font-size:1.04rem;margin-top:6px;line-height:1.6}
.mypend{margin:22px 0}
.mypend .row{display:flex;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line);font-size:.86rem}
.badge{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;padding:3px 9px;border-radius:2px}
.badge.pending{background:#F2E7C9;color:#8A6D1A}
.badge.rejected{background:#EFDBDA;color:var(--shu)}
.admin-pend{border:1px solid var(--shu);border-radius:2px;background:#FDF8F7;padding:20px 22px;margin-bottom:26px}
.admin-pend h3{font-family:var(--mincho);font-size:1rem;color:var(--shu);margin-bottom:12px}
.admin-pend .pq{background:#fff;border:1px solid var(--line);border-radius:2px;padding:14px 16px;margin-bottom:10px}
.admin-pend .pq .t{font-weight:700;font-size:.92rem}
.admin-pend .pq .b{font-size:.84rem;color:var(--nezumi);margin:6px 0 10px;white-space:pre-wrap}
.admin-pend .pq .who{font-size:.74rem;color:var(--nezumi)}
.admin-pend .acts{display:flex;gap:8px;margin-top:8px}
.abtn{border:0;padding:8px 16px;border-radius:2px;font-size:.8rem;font-weight:700;cursor:pointer}
.abtn.ok{background:var(--ai);color:#fff}
.abtn.no{background:#fff;color:var(--shu);border:1px solid var(--shu)}
/* コメント */
.cwrap{margin-top:30px}
.cwrap h4{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;color:var(--nezumi);margin-bottom:14px}
.cm{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.cm .cbody{flex:1;min-width:0}
.cm .chead{display:flex;gap:10px;align-items:baseline;font-size:.8rem}
.cm .chead b{font-weight:700}
.cm .chead .dt{font-family:var(--mono);font-size:.62rem;color:var(--nezumi)}
.cm .chead .del{margin-left:auto;background:none;border:none;font-size:.7rem;color:var(--nezumi);text-decoration:underline}
.cm .ctext{font-size:.9rem;margin-top:4px;white-space:pre-wrap;word-break:break-word}
.cm.admin{background:#FDF8F7;border:1px solid rgba(185,50,39,.3);border-radius:2px;padding:14px 16px;margin:0 0 10px}
.cm.admin .avatar{background:var(--shu)}
.cm.admin .chead b{color:var(--shu)}
.cm.admin .chead b::after{content:"運営";font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;background:var(--shu);color:#fff;padding:2px 7px;border-radius:2px;margin-left:8px;vertical-align:1px}
.cform{margin-top:20px}
.cform textarea{width:100%;min-height:88px;padding:12px 13px;border:1px solid var(--line);border-radius:2px;font-size:.92rem;background:#fff;font-family:var(--gothic);line-height:1.8;resize:vertical}
.cform textarea:focus{outline:none;border-color:var(--ai)}
.cform .crow{display:flex;align-items:center;gap:12px;margin-top:10px}
.cform .cmsg{font-size:.78rem;color:var(--shu)}


.map-intro{background:#fff;border:1px solid var(--line);border-left:3px solid var(--shu);border-radius:2px;padding:20px 24px;margin-bottom:26px;max-width:680px}
.map-intro h3{font-family:var(--mincho);font-weight:800;font-size:1.06rem;margin-bottom:8px}
.map-intro p{font-size:.88rem;color:var(--nezumi)}
.map-intro .cta{margin-top:10px;color:var(--kachi)}
.map-intro .cta a{margin-left:10px;font-weight:700}
.mchips{display:flex;flex-wrap:wrap;gap:8px}
.mchip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:.8rem}
.mchip b{font-family:var(--mincho);font-weight:600;margin-right:4px}
.mchip.un{border-style:dashed;color:var(--nezumi)}
.danger{margin-top:34px;border:1px solid rgba(185,50,39,.35);border-radius:2px;background:#FDF8F7;padding:20px 24px;max-width:560px}
.danger h4{font-family:var(--mincho);font-size:.96rem;color:var(--shu);margin-bottom:6px}
.danger p{font-size:.8rem;color:var(--nezumi);margin-bottom:14px}
.pbtn.ghost{background:#fff;color:var(--shu);border:1px solid var(--shu)}


/* ============ 管理画面 ============ */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:34px}
.scard{background:#fff;border:1px solid var(--line);border-radius:2px;padding:16px 18px}
.scard .k{font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;color:var(--nezumi)}
.scard .v{font-family:var(--mincho);font-weight:800;font-size:1.8rem;color:var(--ai);line-height:1.2;margin-top:4px}

/* ============ 在留審査処理期間 ============ */
.kk-banner{display:block;width:100%;text-align:left;border:0;font-family:var(--gothic);

.kk-banner *{pointer-events:none}

  padding:11px 22px;border-radius:2px;transition:gap .18s ease}

.kk-src{font-size:.76rem;color:var(--nezumi);font-family:var(--mono);letter-spacing:.03em;background:#fff;border:1px solid var(--line);border-radius:2px;padding:12px 16px;margin-bottom:20px}

.kk-src a{color:var(--ai);font-family:var(--gothic);letter-spacing:0;font-weight:500}
.kk-src{line-height:2}
.kk-sec{margin-bottom:38px}
.kk-sh{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.kk-sh .no{font-family:var(--mono);font-size:.64rem;letter-spacing:.2em;color:var(--asagi)}

.kk-sec h3{font-family:var(--mincho);font-weight:800;font-size:1.16rem;letter-spacing:.03em;word-break:auto-phrase;line-break:strict}

.kk-defs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}

.kk-def h4{font-family:var(--mincho);font-size:1rem;font-weight:600}
.kk-def p{font-size:.8rem;color:var(--nezumi);margin-top:6px;word-break:auto-phrase;line-break:strict}
.kk-callout{background:#fff;border-left:3px solid var(--ai);border-radius:2px;padding:12px 16px;margin-top:14px;font-size:.82rem}
.kk-picker{background:#fff;border:1px solid var(--line);border-radius:2px;padding:22px;margin-top:18px}
.kk-picker label{font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;color:var(--nezumi);display:block;margin-bottom:8px}
.kk-picker select{width:100%;max-width:400px;padding:12px 13px;border:1px solid var(--line);border-radius:2px;font-size:.98rem;background:#F7F8F7;appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--nezumi) 50%),linear-gradient(135deg,var(--nezumi) 50%,transparent 50%);
  background-position:calc(100% - 20px) calc(50% + 1px),calc(100% - 15px) calc(50% + 1px);background-size:5px 5px,5px 5px;background-repeat:no-repeat;font-family:var(--gothic)}

.kk-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}

.kk-card .mlbl{font-size:.7rem;color:var(--asagi);font-weight:700}
.kk-card .sub{font-size:.74rem;color:var(--nezumi);margin-top:10px;padding-top:9px;border-top:1px dashed var(--line)}
.kk-card .sub b{font-family:var(--mono);color:var(--kachi);font-size:.84rem}
.kk-card .yoy{font-family:var(--mono);font-size:.7rem;margin-top:7px}
.kk-card.na{background:#F7F8F7}
.kk-card.na .main{color:var(--nezumi);font-size:1.2rem;font-family:var(--gothic);font-weight:500}
.kk-up{color:var(--shu)}.kk-down{color:var(--asagi)}.kk-flat{color:var(--nezumi)}
.kk-tools{display:flex;gap:10px;align-items:center;margin:18px 0 10px;flex-wrap:wrap}
.kk-tools input{padding:9px 13px;border:1px solid var(--line);border-radius:2px;font-size:.84rem;background:#fff;min-width:180px;flex:1;max-width:280px}

.kk-seg{display:flex;border:1px solid var(--line);border-radius:2px;overflow:hidden}

.kk-tbl tbody tr:hover td,.kk-tbl tbody tr:hover th{background:#F5F8F8}
.kk-cmp{margin-top:20px;display:grid;gap:10px}
.kk-crow{background:#fff;border:1px solid var(--line);border-radius:2px;padding:15px 18px;display:grid;grid-template-columns:1.4fr 1fr 1fr 1.1fr;gap:14px;align-items:center}
.kk-crow .nm{font-family:var(--mincho);font-weight:600;font-size:.94rem}
.kk-crow .nm small{display:block;font-family:var(--gothic);font-size:.68rem;color:var(--nezumi);font-weight:400;margin-top:2px}
.kk-crow .box .l{font-family:var(--mono);font-size:.56rem;letter-spacing:.12em;color:var(--nezumi);display:block}
.kk-crow .box .v{font-family:var(--mincho);font-weight:800;font-size:1.5rem;line-height:1.2}
.kk-crow .box .v.own{color:var(--ai)}
.kk-crow .box .med{font-family:var(--mono);font-size:.7rem;color:var(--nezumi)}
.kk-crow .gap{font-family:var(--mono);font-size:.84rem;text-align:right}
.kk-crow.note-row{border-left:3px solid var(--shu);background:#FDFAF9}
.kk-crow.note-row .v.own{color:var(--shu)}
.kk-refnote{font-size:.74rem;color:var(--nezumi);grid-column:1/-1;border-top:1px dashed var(--line);padding-top:9px;margin-top:3px;word-break:auto-phrase;line-break:strict}
@media(max-width:860px){
  .kk-defs,.kk-cards{grid-template-columns:1fr}
  .kk-crow{grid-template-columns:1fr 1fr;gap:10px}
  .kk-crow .nm{grid-column:1/-1}
  .kk-crow .gap{grid-column:1/-1;text-align:left;border-top:1px dashed var(--line);padding-top:7px}
}
.kk-warn{background:#FDF8F7;border:1px solid rgba(185,50,39,.3);border-radius:2px;padding:14px 18px;margin-top:16px;font-size:.8rem;line-height:1.9;word-break:auto-phrase;line-break:strict}
.kk-warn b{color:var(--shu);font-family:var(--mincho)}
.kk-movers{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:16px}
.kk-mv{background:#fff;border:1px solid var(--line);border-radius:2px;padding:14px 16px}
.kk-mv.u{border-left:3px solid var(--shu)}
.kk-mv.d{border-left:3px solid var(--asagi)}
.kk-mv .nm{font-family:var(--mincho);font-weight:600;font-size:.88rem}
.kk-mv .nm small{font-family:var(--gothic);font-size:.66rem;color:var(--nezumi);font-weight:400}
.kk-mv .fig{display:flex;align-items:baseline;gap:8px;margin-top:6px;font-family:var(--mono)}
.kk-mv .old{color:var(--nezumi);font-size:.82rem}
.kk-mv .new{font-family:var(--mincho);font-weight:800;font-size:1.4rem}
.kk-mv .d{font-family:var(--mono);font-size:.7rem;margin-top:2px}
.kk-notes{background:#fff;border:1px solid var(--line);border-radius:2px;padding:24px;margin-top:16px}
.kk-notes h4{font-family:var(--mincho);font-size:.98rem;font-weight:600;margin-bottom:10px}
.kk-notes h4:not(:first-child){margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.kk-notes ul{list-style:none}
.kk-notes li{font-size:.82rem;color:var(--nezumi);padding:6px 0 6px 19px;position:relative;line-height:1.8;word-break:auto-phrase;line-break:strict}
.kk-notes li::before{content:"";position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:var(--asagi)}
.kk-notes li.imp::before{background:var(--shu)}
.kk-notes li b{color:var(--kachi)}
.kk-notes li a{word-break:break-all}


/* ---- 依頼者への回答 ---- */
.kk-say{display:grid;gap:10px;margin-top:18px}
.kk-r{background:#fff;border:1px solid var(--line);border-left:3px solid var(--asagi);border-radius:2px;padding:16px 20px;
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
.kk-r .q{font-family:var(--mincho);font-weight:600;font-size:.98rem}
.kk-r .a{font-family:var(--mincho);font-weight:800;font-size:1.5rem;color:var(--ai);line-height:1.3;text-align:right;white-space:nowrap}
.kk-r .a small{display:block;font-family:var(--mono);font-size:.62rem;color:var(--nezumi);font-weight:400;margin-top:3px}
.kk-r.long{border-left-color:var(--shu)}
.kk-r.long .a{color:var(--shu)}
@media(max-width:640px){.kk-r{grid-template-columns:1fr;gap:6px}.kk-r .a{text-align:left}}
.kk-say-note{background:#fff;border:1px solid var(--line);border-radius:2px;padding:16px 20px;margin-top:14px;font-size:.84rem;line-height:1.9;word-break:auto-phrase;line-break:strict}
.kk-say-note b{font-family:var(--mincho)}
.kk-say-note .ng{color:var(--shu)}


/* ---- 入管別 ---- */
.kk-kyoku{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:2px;margin-top:18px}
.kk-kt{width:100%;border-collapse:collapse;font-size:.86rem;min-width:520px}
.kk-kt thead th{background:#F0F2F4;font-size:.66rem;font-weight:700;letter-spacing:.05em;color:var(--ai);padding:9px 10px;border-bottom:1px solid var(--line);text-align:center;white-space:nowrap}
.kk-kt thead th.g{border-left:1px solid var(--line)}
.kk-kt tbody th{font-family:var(--mincho);font-weight:600;font-size:.92rem;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:#FAFBFA}
.kk-kt tbody th .ref{font-family:var(--mono);font-size:.56rem;color:var(--shu);margin-left:6px;font-weight:400;letter-spacing:.06em}
.kk-kt tbody td{padding:11px 14px;border-bottom:1px solid var(--line);text-align:right;font-family:var(--mono);font-size:.9rem}

/* ============ モバイル ============ */

/* ---------- 随時届出チェッカー（share.html より移植） ---------- */
/* ===== 随時届出チェッカー (zc-) share.html より移植 ===== */

#zc-view .zc-result.show{display:block;}
#zc-view .zc-verdict{padding:16px 18px;display:flex;align-items:center;gap:14px;}
#zc-view .zc-stamp{flex:0 0 auto;width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;border:3px solid;}
#zc-view .zc-v-need .zc-stamp{color:var(--zc-need);border-color:var(--zc-need);background:var(--zc-need-bg);}
#zc-view .zc-v-no .zc-stamp{color:var(--zc-no);border-color:var(--zc-no);background:var(--zc-no-bg);}
#zc-view .zc-v-ask .zc-stamp{color:var(--zc-ask);border-color:var(--zc-ask);background:var(--zc-ask-bg);}
#zc-view .zc-headline{font-size:16px;font-weight:800;}
#zc-view .zc-v-need .zc-headline{color:var(--zc-need);}
#zc-view .zc-v-no .zc-headline{color:var(--zc-no);}
#zc-view .zc-v-ask .zc-headline{color:var(--zc-ask);}
#zc-view .zc-vsub{font-size:13px;color:var(--zc-sub);margin-top:2px;}
#zc-view .zc-detail{border-top:1px solid var(--zc-line);padding:14px 18px;font-size:13.5px;}
#zc-view .zc-drow{display:flex;gap:10px;padding:6px 0;border-bottom:1px dashed #eef2f7;}
#zc-view .zc-drow:last-child{border-bottom:none;}
#zc-view .zc-k{flex:0 0 96px;color:var(--zc-sub);font-weight:700;font-size:12.5px;}
#zc-view .zc-val{flex:1;}
#zc-view .zc-detail ul{margin:2px 0 0;padding-left:18px;}
#zc-view .zc-detail li{margin:2px 0;}
#zc-view .zc-tag{display:inline-block;background:#eef2f7;color:var(--zc-navy2);border-radius:5px;padding:1px 7px;font-size:12px;font-weight:700;margin:2px 4px 2px 0;}
#zc-view .zc-note{background:#fffbeb;border-left:3px solid #f59e0b;padding:8px 12px;border-radius:0 6px 6px 0;font-size:13px;color:#92400e;margin-top:4px;}
#zc-view .zc-back{background:none;border:none;color:var(--zc-navy2);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px;font-weight:700;}
#zc-view .zc-back:hover{text-decoration:underline;}
#zc-view .zc-empty{padding:16px;color:var(--zc-sub);font-size:13px;text-align:center;border:1px dashed var(--zc-line);border-radius:10px;}
#zc-view .zc-disc{margin-top:28px;font-size:12px;color:var(--zc-sub);border-top:1px solid var(--zc-line);padding-top:14px;}
#zc-view .zc-disc a{color:var(--zc-navy2);}
#zc-view .zc-formrow{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:3px 0;}
#zc-view .zc-dl{display:inline-flex;align-items:center;gap:3px;background:var(--zc-navy2);color:#fff;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;}
#zc-view .zc-dl:hover{background:var(--zc-navy);}
#zc-view .zc-soon{font-size:11px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:5px;padding:1px 7px;font-weight:700;}
#zc-view .zc-detail li a.zc-dl{margin-left:4px;padding:1px 8px;}
#zc-view .zc-hidden{display:none;}
/* --- ポータル意匠に合わせた上書き（藍・明朝・角丸2px） --- */
#zc-view .zc-head{border-radius:2px;padding:26px 26px;background-color:var(--ai);
  background-image:linear-gradient(rgba(11,18,32,.45),rgba(11,18,32,.45)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.045) 0 1px,transparent 1px 3px);}
#zc-view .zc-head h2{font-family:var(--mincho);font-weight:800;font-size:1.3rem;letter-spacing:.06em;line-height:1.5;}
#zc-view .zc-head p{color:rgba(243,244,242,.7);font-size:.78rem;margin-top:8px;}
#zc-view .zc-deadline{border-radius:2px;background:rgba(185,50,39,.05);border:1px solid rgba(185,50,39,.25);color:var(--shu);font-size:.78rem;}
#zc-view .zc-deadline b{color:var(--shu);}
#zc-view .zc-search input{border-radius:2px;font-family:var(--gothic);font-size:.9rem;}
#zc-view .zc-search input:focus{border-color:var(--ai);box-shadow:none;}
#zc-view .zc-search-hint{font-family:var(--mono);font-size:.64rem;letter-spacing:.06em;}
#zc-view .zc-steplabel{font-family:var(--mono);font-size:.66rem;font-weight:400;letter-spacing:.12em;color:var(--nezumi);}
#zc-view .zc-cat{border-radius:2px;border-left:3px solid var(--ai);transition:border-color .15s;}
#zc-view .zc-cat:hover{border-color:var(--ai);box-shadow:none;transform:none;}
#zc-view .zc-cat span{font-size:.72rem;}
#zc-view .zc-scn{border-radius:2px;}
#zc-view .zc-scn:hover{border-color:var(--ai);background:#fff;}
#zc-view .zc-scn.active{border-color:var(--ai);background:#fff;}
#zc-view .zc-scn .zc-scn-cat{font-family:var(--mono);font-size:.62rem;color:var(--asagi);letter-spacing:.06em;font-weight:400;}
#zc-view .zc-result{border-radius:2px;border-top:3px solid var(--ai);}
#zc-view .zc-stamp{font-family:var(--mincho);border-width:1px;}
#zc-view .zc-headline{font-family:var(--mincho);font-weight:600;font-size:1.15rem;}
#zc-view .zc-vsub{font-size:.78rem;}
#zc-view .zc-k{font-family:var(--mono);font-size:.66rem;font-weight:400;letter-spacing:.06em;}
#zc-view .zc-detail{font-size:.84rem;}
#zc-view .zc-tag{border-radius:2px;background:rgba(30,59,110,.07);color:var(--ai);font-size:.72rem;}
#zc-view .zc-note{background:rgba(46,143,145,.07);border-left:3px solid var(--asagi);border-radius:0;color:var(--kachi);font-size:.78rem;}
#zc-view .zc-dl{border-radius:2px;background:var(--ai);letter-spacing:.04em;font-size:.7rem;}
#zc-view .zc-dl:hover{background:var(--kachi);}
#zc-view .zc-soon{border-radius:2px;font-family:var(--mono);font-size:.64rem;background:rgba(185,50,39,.05);border-color:rgba(185,50,39,.25);color:var(--shu);}
#zc-view .zc-back{font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;color:var(--nezumi);}
#zc-view .zc-back:hover{color:var(--ai);}
#zc-view .zc-empty{border-radius:2px;font-size:.84rem;}
#zc-view .zc-disc{font-size:.72rem;line-height:1.9;}
@media(max-width:520px){#zc-view .zc-cats{grid-template-columns:1fr;}}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<g id="p8"><path id="pe" d="M0,-49 C13,-42 17,-24 9,-9 L0,-4 L-9,-9 C-17,-24 -13,-42 0,-49 Z"/><use href="#pe" transform="rotate(45)"/><use href="#pe" transform="rotate(90)"/><use href="#pe" transform="rotate(135)"/><use href="#pe" transform="rotate(180)"/><use href="#pe" transform="rotate(225)"/><use href="#pe" transform="rotate(270)"/><use href="#pe" transform="rotate(315)"/></g>
<g id="crest-w"><circle r="72" fill="none" stroke="#F3F4F2" stroke-width="7"/><circle r="61" fill="none" stroke="#F3F4F2" stroke-width="3"/><g fill="#F3F4F2"><use href="#p8"/></g><circle r="15" fill="#F3F4F2"/></g>
</defs></svg>

<!-- ============ ログイン ============ -->
<div id="login">
  <div class="card">
    <svg class="crest" viewBox="-80 -80 160 160" aria-hidden="true"><circle r="72" fill="none" stroke="#1E3B6E" stroke-width="7"/><circle r="61" fill="none" stroke="#1E3B6E" stroke-width="3"/><g fill="#1E3B6E"><use href="#p8"/></g><circle r="17" fill="#1E3B6E"/><text x="0" y="6.5" text-anchor="middle" fill="#F3F4F2" font-family="Shippori Mincho B1,serif" font-weight="800" font-size="19">特</text></svg>
    <h1>会員ポータル</h1>
    <div id="stepEmail">
      <p class="d">登録済みのメールアドレスを入力してください。ログイン用の6桁コードをお送りします。</p>
      <input type="email" id="inEmail" placeholder="you@example.com" autocomplete="email">
      <button class="go" id="btnSend">ログインコードを送る</button>
    </div>
    <div id="stepCode" style="display:none">
      <p class="d">メールに届いた6桁のコードを入力してください（有効期限10分）。</p>
      <input type="text" id="inCode" class="code" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
      <button class="go" id="btnVerify">ログイン</button>
      <button class="back" id="btnBack">メールアドレスを入れ直す</button>
    </div>
    <p class="msg" id="loginMsg"></p>
    <p class="lp">ポータルは承認された会員のみご利用いただけます。未登録の方は <a href="../">特行会の登録ページ</a> からご登録ください（事務局の確認後にご案内します）。</p>
  </div>
</div>

<!-- ============ アプリ ============ -->
<div id="app">
<div class="frame">
  <aside>
    <div class="brand">
      <svg viewBox="-80 -80 160 160" aria-hidden="true"><use href="#crest-w"/></svg>
      <div><b>特行会ポータル</b><i>MEMBER PORTAL ver.20260717.43</i></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <a class="ask" id="askBtn" href="#">質問する</a>
      <div class="who" id="whoami"></div>
      <button class="out" id="logoutBtn">ログアウト</button>
    </div>
  </aside>

  <main>
    <div class="mhead">
      <svg viewBox="-80 -80 160 160" aria-hidden="true"><use href="#crest-w"/></svg>
      <b>特行会ポータル</b>
      <a class="ask" id="askBtnM" href="#">質問する</a>
      <button class="out" id="logoutBtnM">ログアウト</button>
    </div>
    <div class="mnav" id="mnav"></div>
    <div class="mainhead">
      <h2 id="viewTitle">ホーム</h2>
      <div class="q">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        <input type="search" id="q" placeholder="ポータル内を検索">
      </div>
    </div>
    <div class="content" id="content"><div class="loading">読み込み中…</div></div>
  </main>
</div>
</div>

<script>
const API = 'https://vzpahholgvkvwtwooejf.supabase.co/functions/v1/portal';
const ASK_TO = 'mail@gyosei-cambo.com';
const CATS = [
  ['home','ホーム'],['map','連携マップ'],['news','お知らせ'],['shinsa','審査情報'],['chuui','申請時注意点'],['flow','申請の流れ'],['tpl','参考テンプレート'],['qa','Q&A'],
  ['shitsumon','質問箱'],['case','ケーススタディ'],['tool','資料・ツール'],['zuiji','随時届出チェッカー'],['seminar','セミナー'],['mypage','マイページ']
];
const CATNAME = Object.fromEntries(CATS); CATNAME['admin']='管理';
let TOKEN = localStorage.getItem('tgk_token') || '';
let POSTS = [], PREFS = [], QUESTIONS = [], MYQ = [], PENDING = [], PROFILE = null, IS_ADMIN = false, PREF_MEMBERS = {}, PREF_OFFICES = {}, PREF_HIDDEN = {}, MEMBER_TOTAL = 0, UNREG = 0, view = 'home', region = '', query = '';

const $ = id => document.getElementById(id);
async function api(payload){
  const r = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const d = await r.json().catch(()=>({}));
  return {status:r.status, ...d};
}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fdate(s){const d=new Date(s);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function lmsg(t, ok){const m=$('loginMsg');m.textContent=t;m.className='msg show '+(ok?'ok':'ng');}

/* ---- ログイン ---- */
$('btnSend').addEventListener('click', async ()=>{
  const email = $('inEmail').value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ lmsg('メールアドレスの形式をご確認ください。'); return; }
  const b=$('btnSend'); b.disabled=true; b.textContent='送信中…';
  await api({action:'request_otp', email});
  b.disabled=false; b.textContent='ログインコードを送る';
  sessionStorage.setItem('tgk_email', email);
  $('stepEmail').style.display='none'; $('stepCode').style.display='block';
  lmsg('登録済みのアドレスであれば、コードをお送りしました。届かない場合は迷惑メールもご確認ください。', true);
  $('inCode').focus();
});
$('btnBack').addEventListener('click', ()=>{ $('stepCode').style.display='none'; $('stepEmail').style.display='block'; $('loginMsg').className='msg'; });
$('btnVerify').addEventListener('click', async ()=>{
  const email = sessionStorage.getItem('tgk_email')||'';
  const code = $('inCode').value.trim();
  if(code.length!==6){ lmsg('6桁のコードを入力してください。'); return; }
  const b=$('btnVerify'); b.disabled=true; b.textContent='確認中…';
  const r = await api({action:'verify_otp', email, code});
  b.disabled=false; b.textContent='ログイン';
  if(r.ok && r.token){ TOKEN=r.token; localStorage.setItem('tgk_token',TOKEN); enter(); }
  else if(r.error==='locked'){ lmsg('試行回数の上限に達しました。コードを再送してください。'); }
  else if(r.error==='expired'){ lmsg('コードの有効期限が切れています。再送してください。'); }
  else{ lmsg('コードが一致しません。'); }
});
$('inCode').addEventListener('keydown', e=>{ if(e.key==='Enter') $('btnVerify').click(); });
$('inEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') $('btnSend').click(); });

/* ---- 起動 ---- */
async function enter(){
  $('login').style.display='none'; $('app').style.display='block';
  const r = await api({action:'get_posts', token:TOKEN});
  if(r.error==='auth'){ localStorage.removeItem('tgk_token'); TOKEN=''; location.reload(); return; }
  POSTS = r.posts||[];
  PREFS = r.prefs||[];
  QUESTIONS = r.questions||[];
  MYQ = r.my_questions||[];
  PENDING = r.pending||[];
  PROFILE = r.profile||null;
  IS_ADMIN = !!r.is_admin;
  PREF_MEMBERS = r.pref_members||{};
  PREF_OFFICES = r.pref_offices||{};
  PREF_HIDDEN = r.pref_hidden||{};
  MEMBER_TOTAL = r.member_total||0;
  UNREG = r.unregistered||0;
  [$('askBtn'),$('askBtnM')].forEach(a=>{ a.href='#'; a.addEventListener('click',e=>{e.preventDefault(); go('shitsumon');}); });
  $('whoami').textContent = (PROFILE?PROFILE.name+'　':'')+(r.email||'');
  renderNav();
  go(PROFILE ? 'home' : 'mypage');
}
function count(k){
  if(k==='home') return '';
  if(k==='map') return PREFS.filter(p=>p.status==='partnered').length+'/47';
  if(k==='shitsumon') return QUESTIONS.length + (IS_ADMIN&&PENDING.length?('+'+PENDING.length):'');
  if(k==='mypage'||k==='admin'||k==='zuiji'||k==='flow'||k==='tpl') return '';
  if(k==='chuui') return '5';
  // 審査情報には記事のほかに「在留審査処理期間」が常設されているため、その1件を含める
  if(k==='shinsa') return POSTS.filter(p=>p.category==='shinsa').length + 1;
  return POSTS.filter(p=>p.category===k).length;
}
function navItems(){
  const items = CATS.slice();
  if(IS_ADMIN) items.push(['admin','管理']);
  return items;
}
function renderNav(){
  $('nav').innerHTML = navItems().map(([k,l],i)=>
    `<button class="nv${k===view?' on':''}" data-k="${k}"><span class="no">${String(i).padStart(2,'0')}</span>${l}</button>`).join('');
  $('mnav').innerHTML = navItems().map(([k,l])=>`<button class="${k===view?'on':''}" data-k="${k}">${l}</button>`).join('');
  document.querySelectorAll('#nav .nv, #mnav button').forEach(b=>b.addEventListener('click',()=>go(b.dataset.k)));
}
function go(v){
  if(!PROFILE && v!=='mypage') v='mypage';
  view=v; region=''; query=''; $('q').value='';
  renderNav();
  $('viewTitle').textContent = CATNAME[v]||'';
  render();
  window.scrollTo({top:0});
}

/* ---- 検索 ---- */
$('q').addEventListener('input', e=>{
  query=e.target.value.trim().toLowerCase();
  if(view==='home' && query){ view='search'; $('viewTitle').textContent='検索結果'; }
  if(view==='search' && !query){ go('home'); return; }
  render();
});

/* ---- 描画 ---- */
function render(){
  const c=$('content');
  if(view==='home'){ c.innerHTML = homeHTML(); bindHome(); return; }
  if(view==='map'){ c.innerHTML = mapHTML(); bindMap(); return; }
  if(view==='mypage'){ c.innerHTML = mypageHTML(); bindMypage(); return; }
  if(view==='shitsumon'){ c.innerHTML = shitsumonHTML(); bindShitsumon(); return; }
  if(view==='admin'){ c.innerHTML = '<div class="loading">読み込み中…</div>'; loadAdmin(); return; }
  if(view==='kikan'){ $('viewTitle').textContent='審査情報'; c.innerHTML = kkHTML(); bindKikan(); window.scrollTo({top:0}); return; }
  if(view==='zuiji'){ renderZuiji(); return; }
  if(view==='chuui'){ c.innerHTML = chuuiHTML(); window.scrollTo({top:0}); return; }
  if(view==='flow'){ c.innerHTML = flowHTML(); window.scrollTo({top:0}); return; }
  if(view==='tpl'){ c.innerHTML = tplHTML(); window.scrollTo({top:0}); return; }
  if(view==='search'){ c.innerHTML = listHTML(POSTS.filter(match)); bindList(); return; }
  let rows = POSTS.filter(p=>p.category===view).filter(match);
  let head = '';
  if(view==='shinsa'){
    head += kkBanner();
    const rs=[...new Set(POSTS.filter(p=>p.category==='shinsa'&&p.region).map(p=>p.region))];
    if(rs.length){
      head += '<div class="regions">'+
        `<button class="rg${region===''?' on':''}" data-r=""><h4>全地域</h4><span class="n">${POSTS.filter(p=>p.category==='shinsa').length}件</span></button>`+
        rs.map(r=>`<button class="rg${r===region?' on':''}" data-r="${esc(r)}"><h4>${esc(r)}</h4><span class="n">${POSTS.filter(p=>p.category==='shinsa'&&p.region===r).length}件</span></button>`).join('')+'</div>';
      if(region) rows = rows.filter(p=>p.region===region);
    }
  }
  c.innerHTML = head + ((view==='shinsa' && !rows.length) ? '' : listHTML(rows));
  if($('kkGo')) $('kkGo').addEventListener('click', ()=>{ view='kikan'; renderNav(); render(); });
  c.querySelectorAll('.rg').forEach(b=>b.addEventListener('click',()=>{ region=b.dataset.r; render(); }));
  bindList();
}
function match(p){ return !query || (p.title+p.body+(p.region||'')).toLowerCase().includes(query); }
function listHTML(rows){
  if(!rows.length) return '<div class="empty">該当する記事がありません。</div>';
  return '<div class="list">'+rows.map(p=>`
    <div class="post" data-id="${p.id}">
      <div class="meta">${p.pinned?'<span class="pin">固定</span>':''}<span class="cat">${CATNAME[p.category]||p.category}${p.region?'・'+esc(p.region):''}</span><span>${fdate(p.created_at)}</span></div>
      <h3>${esc(p.title)}</h3>
      <div class="prev">${esc(p.body.replace(/[#*\-]/g,' ').slice(0,120))}</div>
    </div>`).join('')+'</div>';
}
function bindList(){ $('content').querySelectorAll('.post').forEach(el=>el.addEventListener('click',()=>openPost(el.dataset.id))); }

function homeHTML(){
  const pinned = POSTS.filter(p=>p.pinned).slice(0,3);
  const latest = POSTS.filter(p=>!p.pinned).slice(0,8);
  const wm='<svg class="wm" viewBox="-80 -80 160 160"><g fill="#F3F4F2"><use href="#p8"/></g></svg>';
  return `
    ${pinned.length?`<div class="hero-cards">${pinned.map(p=>`
      <div class="hcard" data-id="${p.id}">${wm}
        <div><span class="k">${CATNAME[p.category]}</span>
        <h3>${esc(p.title)}</h3>
        <div class="dt">${fdate(p.created_at)}</div></div>
      </div>`).join('')}</div>`:''}
    <div class="sect">
      <div class="sect-h"><h3>新着</h3></div>
      ${latest.length?`<div class="tl">${latest.map(p=>`
        <div class="tl-item" data-id="${p.id}">
          <div class="tl-meta"><span>${fdate(p.created_at)}</span><span class="c">${CATNAME[p.category]}${p.region?'・'+esc(p.region):''}</span></div>
          <div class="tl-t">${esc(p.title)}</div>
        </div>`).join('')}</div>`:'<div class="empty">記事はまだありません。</div>'}
    </div>
    <div class="sect">
      <div class="sect-h"><h3>カテゴリ</h3></div>
      <div class="tiles">${CATS.slice(1).map(([k,l],i)=>`
        <button class="tile" data-k="${k}"><span class="no">${String(i+1).padStart(2,'0')}</span><h4>${l}</h4><span class="n">${count(k)} 件</span></button>`).join('')}</div>
    </div>`;
}
function bindHome(){
  $('content').querySelectorAll('.hcard,.tl-item').forEach(el=>el.addEventListener('click',()=>openPost(el.dataset.id)));
  $('content').querySelectorAll('.tile').forEach(el=>el.addEventListener('click',()=>go(el.dataset.k)));
}

/* ---- 記事 ---- */
function openPost(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const back = view;
  const rel = POSTS.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,3);
  $('viewTitle').textContent = CATNAME[p.category]||'';
  $('content').innerHTML = `
    <div class="backbar"><button id="backList">← 戻る</button></div>
    <div class="article">
      <div class="meta"><span class="cat">${CATNAME[p.category]||p.category}${p.region?'・'+esc(p.region):''}</span><span>${fdate(p.created_at)}</span></div>

function shrinkImage(file, max){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      res(cv.toDataURL('image/jpeg',.85).split(',')[1]);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}

/* ---- 質問詳細＋コメント ---- */
async function openQuestion(id){
  const q = QUESTIONS.find(x=>x.id===id); if(!q) return;
  $('viewTitle').textContent='質問箱';
  $('content').innerHTML = `
    <div class="backbar"><button id="backQ">← 質問箱へ戻る</button></div>
    <div class="article" style="border-top-color:var(--asagi)">
      <div class="qm" style="display:flex;gap:10px;align-items:center;font-size:.8rem;color:var(--nezumi)">
        ${avatarHTML(q.author_photo,q.author_name,true)}<span><b style="color:var(--kachi)">${esc(q.author_name)}</b>${q.author_office?'　'+esc(q.author_office):''}</span><span style="margin-left:auto;font-family:var(--mono);font-size:.66rem">${fdate(q.created_at)}</span>
      </div>
      <h1>${esc(q.title)}</h1>
      <div class="abody" style="white-space:pre-wrap">${esc(q.body)}</div>
      <div class="cwrap">
        <h4>COMMENTS</h4>
        <div id="cAdmin"></div>
        <div id="cList"><div class="loading" style="padding:30px 0">読み込み中…</div></div>
        <div class="cform">
          <textarea id="cBody" maxlength="1000" placeholder="コメントを書く（氏名が表示されます）"></textarea>
          <div class="crow"><button class="pbtn" id="cSend">コメントする</button><span class="cmsg" id="cMsg"></span></div>
        </div>
      </div>
    </div>`;
  $('backQ').addEventListener('click',()=>go('shitsumon'));
  $('cSend').addEventListener('click', async ()=>{
    const t=$('cBody').value.trim(), msg=$('cMsg');
    if(!t){ msg.textContent='内容を入力してください。'; return; }
    if(!PROFILE&&!IS_ADMIN){ alert('先にマイページのご登録が必要です。'); go('mypage'); return; }
    const b=$('cSend'); b.disabled=true;
    const r=await api({action:'add_comment', token:TOKEN, question_id:id, body:t});
    b.disabled=false;
    if(r.ok){ $('cBody').value=''; msg.textContent=''; loadComments(id); }
    else if(r.error==='ng_word'){ msg.textContent='不適切な表現が含まれている可能性があります。'; }
    else if(r.error==='rate'){ msg.textContent='間隔が短すぎます。少し待ってください。'; }
    else{ msg.textContent='送信に失敗しました。'; }
  });
  loadComments(id);
  window.scrollTo({top:0});
}
async function loadComments(id){
  const r = await api({action:'get_comments', token:TOKEN, question_id:id});
  const cs = r.comments||[];
  const admin = cs.filter(c=>c.is_admin), member = cs.filter(c=>!c.is_admin);
  const cmHTML = c=>`
    <div class="cm${c.is_admin?' admin':''}" data-id="${c.id}">
      ${avatarHTML(c.author_photo, c.author_name, true)}
      <div class="cbody">
        <div class="chead"><b>${esc(c.author_name)}</b><span class="dt">${fdate(c.created_at)}</span>${(c.mine||IS_ADMIN)?'<button class="del">削除</button>':''}</div>
        <div class="ctext">${esc(c.body)}</div>
      </div>
    </div>`;
  $('cAdmin').innerHTML = admin.map(cmHTML).join('');
  $('cList').innerHTML = member.length?member.map(cmHTML).join(''):'<div style="font-size:.84rem;color:var(--nezumi);padding:8px 0">コメントはまだありません。</div>';
  document.querySelectorAll('.cm .del').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('このコメントを削除しますか？')) return;
    const el=b.closest('.cm');
    const r=await api({action:'delete_comment', token:TOKEN, comment_id:el.dataset.id});
    if(r.ok) loadComments(id);
  }));
}

  if(!r.ok){ $('content').innerHTML='<div class="empty">権限がありません。</div>'; return; }
  ADMIN = r;
  renderAdmin();
}

  $('memQ').addEventListener('input', e=>{ memFilter=e.target.value.trim().toLowerCase(); renderAdmin(); });

    if(!confirm(b.dataset.e+' を承認しますか？（承認メールが本人に届きます）')) return;
    b.disabled=true;
    await api({action:'admin_set_member', token:TOKEN, member_email:b.dataset.e, decision:'approved'});
    await loadAdmin();
  }));
  document.querySelectorAll('.mem-no').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm(b.dataset.e+' を却下しますか？（ポータルにログインできなくなります）')) return;
    b.disabled=true;
    await api({action:'admin_set_member', token:TOKEN, member_email:b.dataset.e, decision:'rejected'});

    const head=['氏名','事務所','都道府県','取扱件数月平均','メール','LP登録日','入会状態','プロフィール'];
    const rows=ADMIN.members.map(m=>[
      m.profile?m.profile.name:m.reg_name, m.profile?m.profile.office:m.reg_office,
      m.profile?m.profile.pref:'', VOLLBL[m.volume]||m.volume, m.email, fdate(m.registered_at), STJP[m.status]||m.status, m.profile?'登録済':'未登録']);
    const csvEsc=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
    const csv='\uFEFF'+[head].concat(rows).map(r=>r.map(csvEsc).join(',')).join('\r\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='tokugyokai_members.csv'; a.click(); URL.revokeObjectURL(a.href);

  $('apSend').addEventListener('click', async ()=>{

    const b=$('apSend'); b.disabled=true;

    if(r.ok){ await reloadData(); await loadAdmin(); }
    else{ msg.textContent='投稿に失敗しました。'; msg.className='fmsg show ng'; }
  });
  document.querySelectorAll('.postrow').forEach(row=>{
    row.querySelector('.tgl').addEventListener('click', async ()=>{

      await api({action:'admin_delete_post', token:TOKEN, post_id:row.dataset.id});
      await reloadData(); await loadAdmin();
    });
  });

function kkD(a,b){ return (a===null||b===null)?null:Math.round((a-b)*10)/10; }
function kkDH(d){
  if(d===null) return '<span class="kk-flat">前年比 ―</span>';
  if(d===0) return '<span class="kk-flat">±0 日</span>';
  return '<span class="kk-'+(d>0?'up':'down')+'">'+(d>0?'▲ +':'▼ ')+d.toFixed(1)+' 日</span>';
}
function kkBanner(){
  return `<button type="button" class="kk-banner" id="kkGo">
    <svg class="wm" viewBox="-80 -80 160 160" aria-hidden="true"><g fill="#F3F4F2"><use href="#p8"/></g></svg>

    <span class="go">日数を見る<span class="ar">→</span></span>
  </button>`;
}
function kkCard(title, main, mainLbl, sub, subLbl, dv, noSub){
  if(main===null) return `<div class="kk-card na"><span class="ct">${title}</span><div class="main">公表なし</div><div class="sub">公表資料で斜線の区分です。</div></div>`;
  return `<div class="kk-card">
    <span class="ct">${title}</span>
    <div class="main">${main.toFixed(1)}<small>日</small></div>
    <div class="mlbl">${mainLbl}</div>
    <div class="sub">${noSub?'審査終了までの日数は公表されていません。':subLbl+'：<b>'+(sub===null?'―':sub.toFixed(1))+'</b> 日'}</div>
    <div class="yoy">令和7年2月比 ${kkDH(dv)}</div>
  </div>`;
}

function kkMoversHTML(){

           ['特定技能2号',0,'認定／交付まで'],['特定技能2号',2,'更新／審査終了まで'],['特定技能2号',4,'変更／審査終了まで']];
  return T.map(([n,idx,sub])=>{
    const d=KK.find(x=>x.n===n&&!x.s);
    const o=d.r7[idx], v=d.r8[idx], df=kkD(v,o);
    return `<div class="kk-mv ${df>0?'u':'d'}">
      <div class="nm">${esc(n)}<br><small>${sub}</small></div>
      <div class="fig"><span class="old">${o.toFixed(1)}</span><span class="kk-${df>0?'up':'down'}">→</span><span class="new kk-${df>0?'up':'down'}">${v.toFixed(1)}</span></div>
      <div class="d">${kkDH(df)}</div>
    </div>`;
  }).join('');
}
function kkTableHTML(){
  const head=`<thead>
    <tr><th rowspan="2">在留資格</th><th class="g">認定証明書 交付</th><th class="g" colspan="2">在留期間 更新</th><th class="g" colspan="2">在留資格 変更</th></tr>
    <tr><th class="g">処分（交付）まで</th><th class="g">処分まで</th><th>審査終了まで</th><th class="g">処分まで</th><th>審査終了まで</th></tr></thead>`;
  const rows=KK.filter(d=>d.n==='特定技能1号'||d.n==='特定技能2号');
  const cell=(v,cls)=> v===null?`<td class="nav ${cls||''}">―</td>`:`<td class="${cls||''}">${v.toFixed(1)}</td>`;
  const body=rows.map(d=>`<tr><th>${esc(kkLbl(d))}</th>${cell(d.r8[0],'g')}
    ${cell(d.r8[1],'g')}${cell(d.r8[2],'key')}
    ${cell(d.r8[3],'g')}${cell(d.r8[4],'key')}</tr>`).join('');
  return head+'<tbody>'+body+'</tbody>';
}

/* ---- 簡易マークダウン ---- */
function md(src){
  const lines = esc(src).split(/\r?\n/);
  let out='', inUl=false;
  const inline = t => t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  for(const ln of lines){
    if(/^\s*[-・]\s+/.test(ln)){ if(!inUl){out+='<ul>';inUl=true;} out+='<li>'+inline(ln.replace(/^\s*[-・]\s+/,''))+'</li>'; continue; }
    if(inUl){ out+='</ul>'; inUl=false; }
    if(/^###\s+/.test(ln)) out+='<h3>'+inline(ln.replace(/^###\s+/,''))+'</h3>';
    else if(/^##\s+/.test(ln)) out+='<h2>'+inline(ln.replace(/^##\s+/,''))+'</h2>';
    else if(ln.trim()==='') out+='';
    else out+='<p>'+inline(ln)+'</p>';
  }
  if(inUl) out+='</ul>';
  return out;
}

  var VMAP={};

  var ALL=[]; DATA.forEach(function(cat){ cat.scns.forEach(function(s){ ALL.push({cat:cat,s:s}); }); });
  var FORM_BASE='https://ofusa2026.github.io/org-view/youshiki/';
  var ZC_FORMS={'3-1-1':{f:'3-1-1.xlsx',n:'参考様式第3-1-1号.xlsx',b:'3-1'},'3-1-2':{f:'3-1-2.xlsx',n:'参考様式第3-1-2号.xlsx',b:'3-1'},'3-2':{f:'3-2.xlsx',n:'参考様式第3-2号.xlsx',b:'3-2'},'3-3-1':{f:'3-3-1.xlsx',n:'参考様式第3-3-1号.xlsx',b:'3-3'},'3-3-2':{f:'3-3-2.xlsx',n:'参考様式第3-3-2号.xlsx',b:'3-3'},'3-4':{f:'3-4.xlsx',n:'参考様式第3-4号.xlsx',b:'3-4'},'3-5':{f:'3-5.xlsx',n:'参考様式第3-5号.xlsx',b:'3-5'},'3-7':{f:'3-7.xlsx',n:'参考様式第3-7号.xlsx',b:'3-7'},'5-4':{f:'5-4.docx',n:'参考様式第5-4号.docx'},'5-5':{f:'5-5.xlsx',n:'参考様式第5-5号.xlsx'},'5-6':{f:'5-6.xlsx',n:'参考様式第5-6号.xlsx'},'5-11':{f:'5-11.xlsx',n:'参考様式第5-11号.xlsx'},'5-12':{f:'5-12.docx',n:'参考様式第5-12号.docx'},'5-13':{f:'5-13.docx',n:'参考様式第5-13号.docx'},'5-14':{f:'5-14.xlsx',n:'参考様式第5-14号.xlsx'},'5-15':{f:'5-15.xlsx',n:'参考様式第5-15号.xlsx'},'5-18':{f:'5-18.xlsx',n:'参考様式第5-18号.xlsx'},'4-3':{f:'4-3.xlsx',n:'参考様式第4-3号.xlsx',b:'4-3'}};
  var ZC_BESSHI={'3-1':{f:'3-1-besshi.xlsx',n:'参考様式第3-1号別紙.xlsx'},'3-2':{f:'3-2-besshi.xlsx',n:'参考様式第3-2号別紙.xlsx'},'3-3':{f:'3-3-besshi.xlsx',n:'参考様式第3-3号別紙.xlsx'},'3-4':{f:'3-4-besshi.xlsx',n:'参考様式第3-4号別紙.xlsx'},'3-5':{f:'3-5-besshi.xlsx',n:'参考様式第3-5号別紙.xlsx'},'3-7':{f:'3-7-besshi.xlsx',n:'参考様式第3-7号別紙.xlsx'},'4-3':{f:'4-3-besshi.xlsx',n:'参考様式第4-3号随時別紙.xlsx'}};
  function zcNum(str){ var m=String(str).match(/参考様式第([0-9]+(?:-[0-9]+){0,2})号/); return m?m[1]:null; }
  function zcDl(file,name,label){ return '<a class="zc-dl" href="'+FORM_BASE+file+'" download="'+name+'">⬇ '+label+'</a>'; }
  function zcFormTag(str){ var num=zcNum(str); var base='<span class="zc-tag">'+E(str)+'</span>'; if(num&&ZC_FORMS[num]){ var d=ZC_FORMS[num]; var out=base+zcDl(d.f,d.n,'様式DL'); if(d.b&&ZC_BESSHI[d.b]){ var bb=ZC_BESSHI[d.b]; out+=zcDl(bb.f,bb.n,'別紙DL'); } return '<div class="zc-formrow">'+out+'</div>'; } if(num){ return '<div class="zc-formrow">'+base+'<span class="zc-soon">様式準備中</span></div>'; } return '<div class="zc-formrow">'+base+'</div>'; }
  function zcAttItem(str){ var num=zcNum(str); if(num&&ZC_FORMS[num]){ var d=ZC_FORMS[num]; return '<li>'+E(str)+' '+zcDl(d.f,d.n,'DL')+'</li>'; } return '<li>'+E(str)+'</li>'; }
  function zcNoteForms(note){ var nums=[],re=/参考様式第([0-9]+(?:-[0-9]+){0,2})号/g,m; while((m=re.exec(String(note)))){ if(nums.indexOf(m[1])<0)nums.push(m[1]); } var out=''; nums.forEach(function(num){ if(ZC_FORMS[num]){ var d=ZC_FORMS[num]; out+=zcDl(d.f,d.n,'様式DL'); if(d.b&&ZC_BESSHI[d.b]){ var bb=ZC_BESSHI[d.b]; out+=zcDl(bb.f,bb.n,'別紙DL'); } } }); return out?'<div class="zc-formrow" style="margin-top:8px;">'+out+'</div>':''; }
  function E(s){ return (typeof esc==='function')?esc(s):String(s==null?'':s); }
  var SKELETON=
   '<div id="zc-view">'
  +'<div class="zc-head"><h2>随時届出 要否チェッカー</h2><p>特定技能所属機関（受入れ企業）の随時届出が必要かを、状況から確認できます</p></div>'
  +'<div class="zc-deadline"><span>⏱</span><div><b>届出が必要な場合、事由が生じた日から14日以内</b>に、所属機関の本店所在地を管轄する地方出入国在留管理局へ提出します（未来日を事由発生日とする届出は不可）。インターネット電子届出も利用できます（事前の利用者情報登録が必要）。</div></div>'
  +'<div class="zc-search"><input id="zc-q" type="text" placeholder="自由文で検索（例：自己都合で退職した／就業場所を変更 など）" autocomplete="off"><div class="zc-search-hint">キーワードを入力すると、43項目から該当しそうな状況を絞り込みます。空欄にするとカテゴリ一覧に戻ります。</div></div>'
  +'<div id="zc-search-results"></div>'
  +'<section id="zc-step1"><p class="zc-steplabel">STEP 1 ／ どんな変化がありましたか？</p><div class="zc-cats" id="zc-catList"></div></section>'
  +'<section id="zc-step2" class="zc-panel zc-hidden"><button class="zc-back" id="zc-back">← 別のカテゴリを選ぶ</button><p class="zc-steplabel" id="zc-catTitle"></p><div class="zc-scns" id="zc-scnList"></div><div class="zc-result" id="zc-result"></div></section>'
  +'<div class="zc-disc">このツールは出入国在留管理庁「特定技能所属機関からの随時届出に関連してお問い合わせの多い事項について（Q&amp;A）」（令和7年6月）および提出資料一覧表に基づく<strong>判定の目安</strong>です。個別のケースでは例外があり得ます。最終的な要否・様式は、大房行政書士法人担当までご相談ください。<br>各種様式・記載例・運用要領：<a href="https://www.moj.go.jp/isa/publications/materials/i-ens_index.html" target="_blank" rel="noopener">出入国在留管理庁 電子届出システムポータル</a></div>'
  +'</div>';

  window.renderZuiji=function(){
    var el=document.getElementById('content'); if(!el) return;
    el.innerHTML=SKELETON;
    bindHome();
  };

  function bindHome(){
    var catList=document.getElementById('zc-catList'); if(!catList) return; catList.innerHTML='';
    DATA.forEach(function(cat){
      var b=document.createElement('button'); b.className='zc-cat';
      b.innerHTML=E(cat.label)+'<span>'+E(cat.hint)+'</span>';
      b.addEventListener('click',function(){ openCat(cat); });
      catList.appendChild(b);
    });
    var back=document.getElementById('zc-back');
    if(back) back.addEventListener('click',function(){
      document.getElementById('zc-step2').classList.add('zc-hidden');
      document.getElementById('zc-step1').classList.remove('zc-hidden');
    });
    var q=document.getElementById('zc-q');
    if(q) q.addEventListener('input',function(){ doSearch(q.value); });
  }

  function openCat(cat){
    var sr=document.getElementById('zc-search-results'); if(sr) sr.innerHTML='';
    var qEl=document.getElementById('zc-q'); if(qEl) qEl.value='';
    document.getElementById('zc-step1').classList.add('zc-hidden');
    var s2=document.getElementById('zc-step2'); s2.classList.remove('zc-hidden');
    document.getElementById('zc-catTitle').textContent='STEP 2 ／ '+cat.label+'：状況を選んでください';
    var scnList=document.getElementById('zc-scnList'); scnList.innerHTML='';
    var resEl=document.getElementById('zc-result'); resEl.className='zc-result'; resEl.innerHTML='';
    cat.scns.forEach(function(s){
      var b=document.createElement('button'); b.className='zc-scn'; b.textContent=s.q;
      b.addEventListener('click',function(){
        Array.prototype.slice.call(scnList.children).forEach(function(c){ c.classList.remove('active'); });
        b.classList.add('active'); showResult(s,resEl);
      });
      scnList.appendChild(b);
    });
  }

  function showResult(s,target){
    var v=VMAP[s.v];
    var html='<div class="zc-verdict '+v.cls+'"><div class="zc-stamp">'+v.stamp+'</div><div><div class="zc-headline">'+v.head+'</div><div class="zc-vsub">'+v.sub+'</div></div></div><div class="zc-detail">';
    if(s.v!==V_NO){ html+='<div class="zc-drow"><div class="zc-k">期限</div><div class="zc-val">'+DEADLINE+'／管轄の地方入管局へ提出</div></div>'; }
    if(s.forms&&s.forms.length){ html+='<div class="zc-drow"><div class="zc-k">届出書様式</div><div class="zc-val">'+s.forms.map(zcFormTag).join('')+'</div></div>'; }
    if(s.att&&s.att.length){ html+='<div class="zc-drow"><div class="zc-k">主な添付</div><div class="zc-val"><ul>'+s.att.map(zcAttItem).join('')+'</ul></div></div>'; }
    if(s.note){ html+='<div class="zc-drow"><div class="zc-k">ポイント</div><div class="zc-val"><div class="zc-note">'+E(s.note)+'</div>'+zcNoteForms(s.note)+'</div></div>'; }
    html+='</div>';
    target.className='zc-result show '+v.cls;
    target.innerHTML=html;
    try{ target.scrollIntoView({behavior:'smooth',block:'nearest'}); }catch(e){}
  }

  function doSearch(qv){
    qv=(qv||'').trim().toLowerCase();
    var sr=document.getElementById('zc-search-results');
    var s1=document.getElementById('zc-step1');
    var s2=document.getElementById('zc-step2');
    if(!sr||!s1||!s2) return;
    if(!qv){ sr.innerHTML=''; s1.classList.remove('zc-hidden'); s2.classList.add('zc-hidden'); return; }
    s2.classList.add('zc-hidden');
    var terms=qv.split(/\s+/).filter(function(t){ return t; });
    var hits=ALL.filter(function(o){
      var hay=((o.cat.label||'')+' '+(o.cat.hint||'')+' '+(o.s.q||'')+' '+(o.s.note||'')).toLowerCase();
      return terms.every(function(t){ return hay.indexOf(t)>=0; });
    });
    if(!hits.length){ s1.classList.remove('zc-hidden'); sr.innerHTML='<div class="zc-empty">該当する状況が見つかりませんでした。言葉を変えるか、下のカテゴリからお選びください。</div>'; return; }
    s1.classList.add('zc-hidden');
    var h='<p class="zc-steplabel">検索結果 '+hits.length+'件 ／ 状況を選んでください</p><div class="zc-scns">';
    hits.forEach(function(o,i){ h+='<button class="zc-scn" data-i="'+i+'"><span class="zc-scn-cat">'+E(o.cat.label)+'</span>'+E(o.s.q)+'</button>'; });
    h+='</div><div class="zc-result" id="zc-sr-result"></div>';
    sr.innerHTML=h;
    var btns=Array.prototype.slice.call(sr.querySelectorAll('.zc-scn'));
    btns.forEach(function(b){
      b.addEventListener('click',function(){
        btns.forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        showResult(hits[+b.getAttribute('data-i')].s, document.getElementById('zc-sr-result'));
      });
    });
  }
})();
